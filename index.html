      <div class="spinner"></div>
      <div>Loading Intelligent Photo Editing Assistant...</div>
      <div style="font-size: 0.8rem; margin-top: 10px; color: #90caf9;">Initializing Python runtime (Pyodide) and installing dependencies...</div>
    </div>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
      const showApp = () => {
        document.getElementById("loading").style.display = "none";
      };

      stlite.mount(
        {
          requirements: [
            "opencv-python-headless",
            "numpy",
            "Pillow",
            "matplotlib",
            "pandas"
          ],
          entrypoint: "app.py",
          files: {
            "app.py": {
              content: `"""
app.py — Intelligent Photo Editing Assistant
Main Streamlit application entry point.

Tabs
----
1. 📤 Upload
2. 🔍 Analysis
3. ✨ Enhancements
4. 🔀 Comparison
5. 📋 Audit Report
6. ℹ️ About
"""

from __future__ import annotations

import time
import io
import sys
import os

# Ensure 'src' is importable when running from project root
sys.path.insert(0, os.path.dirname(__file__))

import cv2
import numpy as np
import streamlit as st
from PIL import Image

# ── Backend imports ──────────────────────────────────────────────────────────
from src.image_io import load_image_from_bytes, ImageValidationError, ImageBundle
from src.analysis import analyse_image, FullAnalysis
from src.composition import analyse_composition, CompositionResult
from src.enhancement import run_enhancement_pipeline, EnhancementResult
from src.scoring import compute_score, ScoreReport
from src.reporting import generate_markdown_report, generate_audit_report
from src.visualization import (
    plot_histogram,
    plot_before_after,
    plot_score_bars,
    overlay_saliency,
    draw_crop_rect,
)
from src.utils import bgr_to_pil, bgr_to_rgb, pil_to_bytes
from src import config as cfg
import matplotlib.pyplot as plt

# ── Helper ───────────────────────────────────────────────────────────────────
def plt_close(fig):
    """Close a matplotlib figure to free memory."""
    plt.close(fig)


# ─────────────────────────────────────────────────────────────────────────────
# Page config (must be first Streamlit call)
# ─────────────────────────────────────────────────────────────────────────────
st.set_page_config(
    page_title="Intelligent Photo Editing Assistant",
    page_icon="📷",
    layout="wide",
    initial_sidebar_state="expanded",
)

# ─────────────────────────────────────────────────────────────────────────────
# Custom CSS
# ─────────────────────────────────────────────────────────────────────────────
st.markdown("""
<style>
/* ── Global ── */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

}

    font-size: 2.8rem;

}

.metric-card {
    background: #1a1a3a;

}

.metric-card.good  { border-left-color: #4caf50; }
.metric-card.warn  { border-left-color: #ff9800; }

}

/* ── Tab colours ── */
.stTabs [data-baseweb="tab"] {
    background: #1a1a3a;
    color: #ccc;
    border-radius: 8px 8px 0 0;
    padding: 0.4rem 1rem;
    margin-right: 4px;
}

.stTabs [aria-selected="true"] {
    background: linear-gradient(135deg, #7c4dff, #00e5ff) !important;
    color: white !important;
}

/* ── Buttons ── */
.stDownloadButton > button {
    background: linear-gradient(135deg, #7c4dff, #00e5ff);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    transition: opacity 0.2s;
}

.stDownloadButton > button:hover { opacity: 0.85; }

/* ── Progress bars ── */
.stProgress > div > div { background: linear-gradient(90deg, #7c4dff, #00e5ff); }
</style>
""", unsafe_allow_html=True)


# ─────────────────────────────────────────────────────────────────────────────
# Session state keys
# ─────────────────────────────────────────────────────────────────────────────
def _init_state():
    defaults = {
        "bundle":      None,
        "analysis":    None,
        "composition": None,
        "enhancement": None,
        "score":       None,
        "md_report":   None,
        "audit_report": None,
    }
    for k, v in defaults.items():
        if k not in st.session_state:
            st.session_state[k] = v


_init_state()


# ─────────────────────────────────────────────────────────────────────────────
# Sidebar
# ─────────────────────────────────────────────────────────────────────────────
with st.sidebar:
    st.markdown("## ⚙️ Settings")
    st.divider()

    st.markdown("### 🛠️ Enhancement Controls")
    fix_exposure      = st.checkbox("Exposure Correction",     value=True)
    fix_contrast      = st.checkbox("CLAHE Contrast",          value=True)
    fix_wb            = st.checkbox("White Balance",           value=True)
    fix_sharpen       = st.checkbox("Sharpening",              value=True)
    fix_denoise       = st.checkbox("Denoising",               value=False)
    fix_saturation    = st.checkbox("Saturation Tuning",       value=False)
    fix_shadow_hl     = st.checkbox("Shadow/Highlight Recovery", value=False)

    st.divider()
    st.markdown("### 🎚️ Fine-tune")
    gamma_val     = st.slider("Gamma override (1.0 = auto)", 0.2, 3.0, 1.0, 0.05,
                               help="Set to 1.0 for automatic adaptive gamma.")
    clahe_clip    = st.slider("CLAHE clip limit",  1.0, 8.0, cfg.DEFAULT_CLAHE_CLIP, 0.5)
    clahe_tile    = st.select_slider("CLAHE tile size", [4, 8, 16, 32], cfg.DEFAULT_CLAHE_TILE)
    sharpen_amt   = st.slider("Sharpening amount", 0.5, 3.0, cfg.DEFAULT_SHARPEN_AMOUNT, 0.1)
    sat_scale     = st.slider("Saturation scale",  0.5, 2.0, 1.3, 0.05)
    denoise_meth  = st.selectbox("Denoise method", ["bilateral", "nlmeans"])

    st.divider()
    if st.session_state.bundle:
        b: ImageBundle = st.session_state.bundle
        st.markdown("### 📁 File Info")
        st.caption(f"**{b.filename}**")
        st.caption(f"Size: {b.original_size[0]}×{b.original_size[1]} px")
        if b.was_resized:
            st.caption(f"⚠️ Resized to {b.processing_size[0]}×{b.processing_size[1]} for processing.")


# ─────────────────────────────────────────────────────────────────────────────
# Page header
# ─────────────────────────────────────────────────────────────────────────────
st.markdown('<p class="main-title">📷 Intelligent Photo Editing Assistant</p>', unsafe_allow_html=True)
st.markdown('<p class="sub-title">Computational Photography · Image Quality Analysis · Auto-Enhancement · Academic Project</p>', unsafe_allow_html=True)

# ─────────────────────────────────────────────────────────────────────────────
# Tabs
# ─────────────────────────────────────────────────────────────────────────────
tab_upload, tab_analysis, tab_enhance, tab_compare, tab_audit, tab_about = st.tabs([
    "📤 Upload",
    "🔍 Analysis",
    "✨ Enhancements",
    "🔀 Comparison",
    "📋 Audit Report",
    "ℹ️ About",
])


# ══════════════════════════════════════════════════════════════════════════════
# TAB 1 — Upload
# ══════════════════════════════════════════════════════════════════════════════
with tab_upload:
    st.markdown('<p class="section-header">Upload Your Photo</p>', unsafe_allow_html=True)

    uploaded = st.file_uploader(
        "Drag & drop or click to upload",
        type=["jpg", "jpeg", "png"],
        help="Supported formats: JPG, JPEG, PNG. Max 50 MB.",
        key="file_uploader",
    )

    if uploaded is not None:
        # Check if we already have this file loaded to avoid clearing state on every rerun
        current_bundle: ImageBundle | None = st.session_state.bundle
        if current_bundle is None or current_bundle.filename != uploaded.name:
            data = uploaded.read()
            with st.spinner("🔍 Validating and loading image…"):
                try:
                    bundle = load_image_from_bytes(data, filename=uploaded.name)
                    st.session_state.bundle      = bundle
                    st.session_state.analysis    = None
                    st.session_state.composition = None
                    st.session_state.enhancement = None
                    st.session_state.score       = None
                    st.session_state.md_report   = None
                    st.session_state.audit_report = None
                    st.success(f"✅ Loaded **{bundle.filename}** successfully!")
                except ImageValidationError as e:
                    st.error(f"❌ Validation failed: {e}")
                    st.session_state.bundle = None

    if st.session_state.bundle:
        bundle: ImageBundle = st.session_state.bundle
        col_img, col_meta = st.columns([2, 1])

        with col_img:
            st.image(bundle.display_pil, caption="Original Image", use_container_width=True)

        with col_meta:
            st.markdown("#### 📷 Image Metadata")
            for key, val in bundle.metadata.items():
                st.markdown(f"**{key}:** \`{val}\`")

        st.divider()
        st.markdown("#### 🚀 Run Analysis Pipeline")
        if st.button("▶ Analyse Image", type="primary", use_container_width=True):
            progress = st.progress(0, text="Starting analysis…")
            bgr = bundle.original_bgr

            # Analysis
            progress.progress(15, text="Analysing brightness, contrast, histogram…")
            analysis = analyse_image(bgr)
            time.sleep(0.05)

            progress.progress(40, text="Analysing sharpness, noise, white balance…")
            time.sleep(0.05)

            progress.progress(55, text="Analysing composition…")
            composition = analyse_composition(bgr)
            analysis.composition = composition.metric
            time.sleep(0.05)

            progress.progress(70, text="Computing quality score…")
            score = compute_score(analysis)
            time.sleep(0.05)

            progress.progress(85, text="Generating reports…")
            md_report = generate_markdown_report(
                bundle.filename, analysis, score, None, composition, bundle.metadata
            )
            audit = generate_audit_report(bundle.filename, analysis, score, None)
            time.sleep(0.05)

            progress.progress(100, text="Done!")

            st.session_state.analysis    = analysis
            st.session_state.composition = composition
            st.session_state.score       = score
            st.session_state.md_report   = md_report
            st.session_state.audit_report = audit

            st.success("✅ Analysis complete! Navigate to the **Analysis** tab to view results.")
    else:
        st.info("👆 Please upload an image to get started.")


# ══════════════════════════════════════════════════════════════════════════════
# TAB 2 — Analysis
# ══════════════════════════════════════════════════════════════════════════════
with tab_analysis:
    if not st.session_state.analysis:
        st.info("📤 Upload an image and click **Analyse Image** first.")
    else:
        analysis: FullAnalysis           = st.session_state.analysis
        score_report: ScoreReport        = st.session_state.score
        composition: CompositionResult   = st.session_state.composition
        bundle: ImageBundle              = st.session_state.bundle
        bgr = bundle.original_bgr

        # ── Score cards row ───────────────────────────────────────────────
        st.markdown('<p class="section-header">Quality Score</p>', unsafe_allow_html=True)

        band_color = {
            "Excellent": "#4caf50", "Good": "#8bc34a", "Average": "#ff9800",
            "Weak": "#ff5722", "Poor": "#f44336",
        }.get(score_report.band, "#9e9e9e")

        c1, c2, c3 = st.columns([1, 1.5, 1])
        with c2:
            st.markdown(
                f'<div class="score-card">'
                f'<div class="score-number" style="color:{band_color}">{score_report.total_score:.1f}</div>'
                f'<div style="font-size:1.1rem;color:{band_color};font-weight:600">{score_report.band}</div>'
                f'<div class="score-label">Overall Quality Score (out of 100)</div>'
                f'</div>',
                unsafe_allow_html=True,
            )

        st.divider()

        # ── Score bar chart ───────────────────────────────────────────────
        col_bars, col_hist = st.columns([1, 1])
        with col_bars:
            st.markdown("**Per-Metric Scores**")
            fig_bars = plot_score_bars(score_report)
            st.pyplot(fig_bars, use_container_width=True)
            plt_close(fig_bars)

        with col_hist:
            st.markdown("**Colour Histogram**")
            fig_hist = plot_histogram(bgr)
            st.pyplot(fig_hist, use_container_width=True)
            plt_close(fig_hist)

        st.divider()

        # ── Metric details ────────────────────────────────────────────────
        st.markdown('<p class="section-header">Detailed Metric Analysis</p>', unsafe_allow_html=True)

        metrics_list = list(analysis.as_dict().items())

        for row_start in range(0, len(metrics_list), 2):
            row_metrics = metrics_list[row_start: row_start + 2]
            cols = st.columns(len(row_metrics))
            for col, (key, metric) in zip(cols, row_metrics):
                with col:
                    if metric.score >= 75:
                        css_cls, icon = "good", "🟢"
                    elif metric.score >= 50:
                        css_cls, icon = "warn", "🟡"
                    else:
                        css_cls, icon = "bad",  "🔴"

                    st.markdown(
                        f'<div class="metric-card {css_cls}">'
                        f'<strong>{icon} {metric.name}</strong><br>'
                        f'<small>Value: <code>{metric.value}</code> &nbsp;|&nbsp; Score: <strong>{metric.score:.0f}/100</strong><br>'
                        f'<em>{metric.label}</em></small>'
                        f'</div>',
                        unsafe_allow_html=True,
                    )
                    with st.expander("Details", expanded=False):
                        st.markdown(f"**Explanation:** {metric.explanation}")
                        st.markdown(f"**Suggestion:** \`{metric.suggestion}\`")
                        if metric.extra:
                            st.json({k: float(v) if isinstance(v, (np.floating, np.integer)) else v
                                     for k, v in metric.extra.items()
                                     if not isinstance(v, np.ndarray)})

        # ── Composition visuals ───────────────────────────────────────────
        st.divider()
        st.markdown('<p class="section-header">Composition Analysis</p>', unsafe_allow_html=True)
        cc1, cc2, cc3 = st.columns(3)

        with cc1:
            st.image(bgr_to_rgb(composition.thirds_overlay),
                     caption="Rule-of-Thirds Grid", use_container_width=True)
        with cc2:
            sal_overlay = overlay_saliency(bgr, composition.saliency_map)
            st.image(bgr_to_rgb(sal_overlay),
                     caption="Saliency Map Overlay", use_container_width=True)
        with cc3:
            if composition.crop_rect:
                crop_img = draw_crop_rect(bgr, composition.crop_rect)
                st.image(bgr_to_rgb(crop_img),
                         caption="Suggested Crop Area", use_container_width=True)

        if composition.metric:
            m = composition.metric
            flag = "🟢" if m.score >= 70 else ("🟡" if m.score >= 45 else "🔴")
            st.markdown(f"**{flag} Composition Score:** {m.score:.1f}/100 — *{m.label}*")
            st.caption(m.explanation)
            if composition.horizon_angle is not None:
                st.caption(f"📐 Detected horizon tilt: **{composition.horizon_angle:.1f}°**")

        # ── What reduced score ────────────────────────────────────────────
        if score_report.reductions:
            st.divider()
            st.markdown('<p class="section-header">⬇️ What Reduced Your Score?</p>', unsafe_allow_html=True)
            for r in score_report.reductions:
                st.markdown(f"- {r}")


# ══════════════════════════════════════════════════════════════════════════════
# TAB 3 — Enhancements
# ══════════════════════════════════════════════════════════════════════════════
with tab_enhance:
    if not st.session_state.analysis:
        st.info("📤 Run the analysis first (Upload tab).")
    else:
        bundle: ImageBundle = st.session_state.bundle
        bgr = bundle.original_bgr

        st.markdown('<p class="section-header">Apply Enhancements</p>', unsafe_allow_html=True)
        st.caption(
            "Toggle corrections in the **sidebar** and click **Apply Enhancements** below. "
            "The pipeline runs: Exposure → White Balance → Contrast → Denoise → Sharpen → Saturation → Shadow/Highlight"
        )

        if st.button("✨ Apply Enhancements", type="primary", use_container_width=True):
            gamma_override = None if abs(gamma_val - 1.0) < 0.05 else gamma_val
            with st.spinner("Applying enhancement pipeline…"):
                t0 = time.perf_counter()
                result = run_enhancement_pipeline(
                    bgr,
                    fix_exposure=fix_exposure,
                    fix_contrast=fix_contrast,
                    fix_white_balance=fix_wb,
                    fix_sharpen=fix_sharpen,
                    fix_denoise=fix_denoise,
                    fix_saturation=fix_saturation,
                    fix_shadow_highlight=fix_shadow_hl,
                    gamma_override=gamma_override,
                    clahe_clip=clahe_clip,
                    clahe_tile=clahe_tile,
                    sharpen_amount=sharpen_amt,
                    saturation_scale=sat_scale,
                    denoise_method=denoise_meth,
                    denoise_strength=cfg.DEFAULT_DENOISE_H,
                )
                elapsed = time.perf_counter() - t0
            st.session_state.enhancement = result
            # Regenerate reports with enhancement info
            score = st.session_state.score
            analysis_st = st.session_state.analysis
            composition_st = st.session_state.composition
            st.session_state.md_report = generate_markdown_report(
                bundle.filename, analysis_st, score,
                result, composition_st, bundle.metadata
            )
            st.session_state.audit_report = generate_audit_report(
                bundle.filename, analysis_st, score, result
            )
            st.success(f"✅ Enhancement pipeline completed in {elapsed:.2f}s — {len(result.steps)} step(s) applied.")

        enh: EnhancementResult | None = st.session_state.enhancement
        if enh:
            st.divider()
            col_orig, col_enh = st.columns(2)
            with col_orig:
                st.image(bgr_to_rgb(bgr), caption="Original", use_container_width=True)
            with col_enh:
                st.image(bgr_to_rgb(enh.enhanced_bgr), caption="Enhanced", use_container_width=True)

            st.divider()
            st.markdown("#### 🛠️ Enhancement Steps Applied")
            for step in enh.steps:
                icon = "✅" if step.applied else "⏭️"
                before_after = ""
                if step.before_stat is not None and step.after_stat is not None:
                    before_after = f" &nbsp;|&nbsp; \`{step.unit}\`: **{step.before_stat} → {step.after_stat}**"
                st.markdown(f"{icon} **{step.name}**{before_after}<br><small>{step.reason}</small>",
                            unsafe_allow_html=True)

            # Download button
            st.divider()
            enh_pil = bgr_to_pil(enh.enhanced_bgr)
            img_bytes = pil_to_bytes(enh_pil, "PNG")
            st.download_button(
                "⬇️ Download Enhanced Image (PNG)",
                data=img_bytes,
                file_name=f"enhanced_{bundle.filename.split('.')[0]}.png",
                mime="image/png",
                use_container_width=True,
            )


# ══════════════════════════════════════════════════════════════════════════════
# TAB 4 — Comparison
# ══════════════════════════════════════════════════════════════════════════════
with tab_compare:
    if not st.session_state.enhancement:
        st.info("✨ Apply enhancements first (Enhancements tab).")
    else:
        bundle: ImageBundle     = st.session_state.bundle
        enh: EnhancementResult  = st.session_state.enhancement
        bgr = bundle.original_bgr
        enh_bgr = enh.enhanced_bgr

        st.markdown('<p class="section-header">Before / After Comparison</p>', unsafe_allow_html=True)

        fig_cmp = plot_before_after(bgr, enh_bgr)
        st.pyplot(fig_cmp, use_container_width=True)
        plt_close(fig_cmp)

        st.divider()
        st.markdown("#### 📊 Histogram Comparison")
        h_c1, h_c2 = st.columns(2)
        with h_c1:
            fig_h1 = plot_histogram(bgr, title="Original — Histogram")
            st.pyplot(fig_h1, use_container_width=True)
            plt_close(fig_h1)
        with h_c2:
            fig_h2 = plot_histogram(enh_bgr, title="Enhanced — Histogram")
            st.pyplot(fig_h2, use_container_width=True)
            plt_close(fig_h2)

        # Quantitative delta
        st.divider()
        st.markdown("#### 📈 Quantitative Changes")

        from src.analysis import analyse_brightness, analyse_contrast, analyse_sharpness, analyse_noise

        orig_br  = analyse_brightness(bgr)
        enh_br   = analyse_brightness(enh_bgr)
        orig_ct  = analyse_contrast(bgr)
        enh_ct   = analyse_contrast(enh_bgr)
        orig_sh  = analyse_sharpness(bgr)
        enh_sh   = analyse_sharpness(enh_bgr)
        orig_no  = analyse_noise(bgr)
        enh_no   = analyse_noise(enh_bgr)

        import pandas as pd
        df = pd.DataFrame({
            "Metric":    ["Brightness (mean)", "Contrast (std)", "Sharpness (Lap. var)", "Noise (σ)"],
            "Original":  [orig_br.value, orig_ct.value, orig_sh.value, orig_no.value],
            "Enhanced":  [enh_br.value,  enh_ct.value,  enh_sh.value,  enh_no.value],
        })
        df["Change"] = df["Enhanced"] - df["Original"]
        df["Change %"] = ((df["Change"] / (df["Original"].abs() + 1e-9)) * 100).round(1).astype(str) + "%"

analysis.py — Image quality analysis engine.

Each public function accepts a BGR NumPy array and returns an
:class:\`AnalysisResult\` for a single metric, or the top-level
:func:\`analyse_image\` collects all metrics at once.
"""

from __future__ import annotations

from dataclasses import dataclass, field
from typing import Optional

import cv2
import numpy as np

from src import config as cfg
from src.utils import bgr_to_gray, bgr_to_hsv, bgr_to_lab, BGRImage, GrayImage


# ---------------------------------------------------------------------------
# Data containers
# ---------------------------------------------------------------------------

@dataclass
class MetricResult:
    """
    Result of one image-quality metric.

    Attributes
    ----------
    name        : Human-readable metric name.
    value       : Measured numeric value (unit depends on metric).
    label       : Short classification, e.g. "Underexposed".
    score       : Sub-score in [0, 100] for the scoring engine.
    explanation : Why this label / score was assigned.
    suggestion  : What enhancement could be applied (or "None needed").
    extra       : Optional dict for histogram arrays, etc.
    """
    name:        str
    value:       float
    label:       str
    score:       float
    explanation: str
    suggestion:  str
    extra:       dict = field(default_factory=dict)


@dataclass
class FullAnalysis:
    """Container for every metric and derived values."""
    brightness:    MetricResult
    contrast:      MetricResult
    histogram:     MetricResult
    sharpness:     MetricResult
    noise:         MetricResult
    white_balance: MetricResult
    saturation:    MetricResult
    dynamic_range: MetricResult
    composition:   Optional[MetricResult] = None   # filled in separately

    def as_dict(self) -> dict[str, MetricResult]:
        d = {
            "exposure":      self.brightness,
            "contrast":      self.contrast,
            "histogram":     self.histogram,
            "sharpness":     self.sharpness,
            "noise":         self.noise,
            "white_balance": self.white_balance,
            "saturation":    self.saturation,
            "dynamic_range": self.dynamic_range,
        }
        if self.composition:
            d["composition"] = self.composition
        return d


# ---------------------------------------------------------------------------
# 1. Brightness / Exposure
# ---------------------------------------------------------------------------

def analyse_brightness(bgr: BGRImage) -> MetricResult:
    """
    Compute grayscale mean and classify exposure.

    Method
    ------
    Convert to grayscale (perceptual weighting via cv2.COLOR_BGR2GRAY)
    and take the mean pixel intensity on a 0–255 scale.

    Thresholds (from config)
    ------------------------
    < BRIGHTNESS_LOW   → Underexposed
    > BRIGHTNESS_HIGH  → Overexposed
    else               → Balanced
    """
    gray = bgr_to_gray(bgr)
    mean_val = float(np.mean(gray))
    p10 = float(np.percentile(gray, 10))
    p90 = float(np.percentile(gray, 90))

    if mean_val < cfg.BRIGHTNESS_LOW:
        label = "Underexposed"
        explanation = (
            f"Mean brightness is {mean_val:.1f}/255, which is below the "
            f"underexposure threshold of {cfg.BRIGHTNESS_LOW}. "
            "Shadows will dominate; detail in dark areas may be lost."
        )
        suggestion = "Apply gamma correction (γ < 1) or increase linear brightness."
        score = (mean_val / cfg.BRIGHTNESS_LOW) * 100
    elif mean_val > cfg.BRIGHTNESS_HIGH:
        label = "Overexposed"
        explanation = (
            f"Mean brightness is {mean_val:.1f}/255, above the overexposure "
            f"threshold of {cfg.BRIGHTNESS_HIGH}. Highlights may be clipped."
        )
        suggestion = "Apply gamma correction (γ > 1) or reduce brightness."
        score = ((255 - mean_val) / (255 - cfg.BRIGHTNESS_HIGH)) * 100
    else:
        label = "Balanced"
        explanation = (
            f"Mean brightness is {mean_val:.1f}/255, well within the ideal "
            f"range [{cfg.BRIGHTNESS_LOW}, {cfg.BRIGHTNESS_HIGH}]."
        )
        suggestion = "No exposure correction needed."
        mid = (cfg.BRIGHTNESS_LOW + cfg.BRIGHTNESS_HIGH) / 2
        score = 100 - abs(mean_val - mid) / (mid - cfg.BRIGHTNESS_LOW) * 15

    score = float(np.clip(score, 0, 100))

    return MetricResult(
        name="Brightness / Exposure",
        value=round(mean_val, 2),
        label=label,
        score=round(score, 1),
        explanation=explanation,
        suggestion=suggestion,
        extra={"p10": round(p10, 2), "p90": round(p90, 2)},
    )


# ---------------------------------------------------------------------------
# 2. Contrast
# ---------------------------------------------------------------------------

def analyse_contrast(bgr: BGRImage) -> MetricResult:
    """
    Compute global contrast as the standard deviation of grayscale luminance.

    Standard deviation is a well-established measure of global contrast
    (Hasler & Suesstrunk, 2003).  A low stddev means most pixels crowd
    around a single intensity — the key symptom of a flat, low-contrast image.
    """
    gray = bgr_to_gray(bgr)
    std_val = float(np.std(gray.astype(np.float32)))

    if std_val < cfg.CONTRAST_LOW:
        label = "Low contrast"
        explanation = (
            f"Grayscale standard deviation is {std_val:.1f}, below the "
            f"low-contrast threshold of {cfg.CONTRAST_LOW}. The image looks flat."
        )
        suggestion = "Apply CLAHE or global histogram stretching."
        score = (std_val / cfg.CONTRAST_LOW) * 70
    elif std_val > cfg.CONTRAST_HIGH:
        label = "High contrast"
        explanation = (
            f"Grayscale std dev is {std_val:.1f}, which is quite high. "
            "The image has stark tonal differences but may clip shadows/highlights."
        )
        suggestion = "Consider highlight/shadow recovery or mild gamma roll-off."
        score = 85.0
    else:
        label = "Good contrast"
        explanation = (
            f"Grayscale std dev is {std_val:.1f} — inside the ideal range "
            f"[{cfg.CONTRAST_LOW}, {cfg.CONTRAST_HIGH}]."
        )
        suggestion = "No contrast enhancement needed."
        score = 100.0

    score = float(np.clip(score, 0, 100))

    return MetricResult(
        name="Contrast",
        value=round(std_val, 2),
        label=label,
        score=round(score, 1),
        explanation=explanation,
        suggestion=suggestion,
    )


# ---------------------------------------------------------------------------
# 3. Histogram Health
# ---------------------------------------------------------------------------

def analyse_histogram(bgr: BGRImage) -> MetricResult:
    """
    Check shadow and highlight clipping in the luminance histogram.

    Clipping is estimated by the fraction of pixels at or near the
    extreme bins (0–7 for shadow, 248–255 for highlights).
    """
    gray = bgr_to_gray(bgr)
    total_pixels = gray.size

    shadow_mask = gray <= 7
    highlight_mask = gray >= 248
    shadow_frac = float(shadow_mask.sum() / total_pixels)
    highlight_frac = float(highlight_mask.sum() / total_pixels)

    # Compute per-channel histograms for extra data
    hist_b = cv2.calcHist([bgr], [0], None, [256], [0, 256]).flatten()
    hist_g = cv2.calcHist([bgr], [1], None, [256], [0, 256]).flatten()
    hist_r = cv2.calcHist([bgr], [2], None, [256], [0, 256]).flatten()
    hist_gray = cv2.calcHist([gray], [0], None, [256], [0, 256]).flatten()

    # Build label and score
    issues = []
    if shadow_frac > cfg.CLIP_FRACTION_THRESHOLD:
        issues.append(f"shadow clipping ({shadow_frac*100:.1f}% of pixels)")
    if highlight_frac > cfg.CLIP_FRACTION_THRESHOLD:
        issues.append(f"highlight clipping ({highlight_frac*100:.1f}% of pixels)")

    if issues:
        label = "Clipping detected"
        explanation = (
            f"Histogram clipping found: {' and '.join(issues)}. "
            "Detail in these regions may be irrecoverably lost."
        )
        suggestion = (
            "Try shadow/highlight recovery or exposure adjustment before clipping occurs."
        )
        clip_penalty = (shadow_frac + highlight_frac) / (2 * cfg.CLIP_FRACTION_THRESHOLD)
        score = float(np.clip(100 - clip_penalty * 40, 30, 100))
    else:
        label = "Healthy histogram"
        explanation = (
            f"Shadow clipping: {shadow_frac*100:.2f}%, "
            f"highlight clipping: {highlight_frac*100:.2f}% — both within tolerance."
        )
        suggestion = "No histogram correction needed."
        score = 100.0

    return MetricResult(
        name="Histogram Health",
        value=round((shadow_frac + highlight_frac) * 100, 2),
        label=label,
        score=round(score, 1),
        explanation=explanation,
        suggestion=suggestion,
        extra={
            "hist_gray": hist_gray,
            "hist_b": hist_b,
            "hist_g": hist_g,
            "hist_r": hist_r,
            "shadow_frac": shadow_frac,
            "highlight_frac": highlight_frac,
        },
    )


# ---------------------------------------------------------------------------
# 4. Sharpness / Blur
# ---------------------------------------------------------------------------

def analyse_sharpness(bgr: BGRImage) -> MetricResult:
    """
    Estimate sharpness using the variance of the Laplacian operator.

    The Laplacian is a second-order derivative filter that responds strongly
    to edges.  In a blurry image edges are smoothed away, so the variance
    of the Laplacian response is low.  This is a classical and computationally
    cheap focus measure (Pech-Pacheco et al., 2000).

    Thresholds
    ----------
    Chosen empirically on typical consumer-camera images:
      < SHARPNESS_BLURRY  → Blurry
      < SHARPNESS_SHARP   → Acceptable
      else                → Sharp
    """
    gray = bgr_to_gray(bgr)
    lap_var = float(cv2.Laplacian(gray, cv2.CV_64F).var())

    if lap_var < cfg.SHARPNESS_BLURRY:
        label = "Blurry"
        explanation = (
            f"Laplacian variance is {lap_var:.1f}, below the blur threshold "
            f"of {cfg.SHARPNESS_BLURRY}. Motion blur or defocus is likely."
        )
        suggestion = "Apply unsharp masking or kernel-based sharpening."
        score = (lap_var / cfg.SHARPNESS_BLURRY) * 60
    elif lap_var < cfg.SHARPNESS_SHARP:
        label = "Acceptable"
        explanation = (
            f"Laplacian variance is {lap_var:.1f}; the image is somewhat sharp "
            "but could benefit from mild sharpening."
        )
        suggestion = "Light sharpening may improve perceived crispness."
        score = 60 + (lap_var - cfg.SHARPNESS_BLURRY) / (cfg.SHARPNESS_SHARP - cfg.SHARPNESS_BLURRY) * 30
    else:
        label = "Sharp"
        explanation = (
            f"Laplacian variance is {lap_var:.1f}, above the sharp threshold "
            f"of {cfg.SHARPNESS_SHARP}. The image is well-focused."
        )
        suggestion = "No sharpening required."
        score = min(100.0, 90 + (lap_var - cfg.SHARPNESS_SHARP) / cfg.SHARPNESS_SHARP * 10)

    score = float(np.clip(score, 0, 100))

    return MetricResult(
        name="Sharpness / Blur",
        value=round(lap_var, 2),
        label=label,
        score=round(score, 1),
        explanation=explanation,
        suggestion=suggestion,
    )


# ---------------------------------------------------------------------------
# 5. Noise Estimation
# ---------------------------------------------------------------------------

def _estimate_noise_sigma(gray: GrayImage) -> float:
    """
    Estimate noise level using a high-frequency residual method.

    The image is smoothed with a 3×3 blur and the residual (original minus
    blurred) is taken.  The standard deviation of this residual is a proxy
    for the RMS noise amplitude.  This is a lightweight but reasonable
    estimator used in many image quality tools.
    """
    blurred = cv2.GaussianBlur(gray.astype(np.float32), (3, 3), 0)
    residual = gray.astype(np.float32) - blurred
    return float(np.std(residual))


def analyse_noise(bgr: BGRImage) -> MetricResult:
    """Estimate noise level from high-frequency residuals."""
    gray = bgr_to_gray(bgr)
    sigma = _estimate_noise_sigma(gray)

    if sigma < cfg.NOISE_LOW:
        label = "Low noise"
        explanation = (
            f"Estimated noise σ ≈ {sigma:.2f} — the image appears clean."
        )
        suggestion = "No denoising required."
        score = 100.0
    elif sigma < cfg.NOISE_HIGH:
        label = "Moderate noise"
        explanation = (
            f"Estimated noise σ ≈ {sigma:.2f}. Mild noise is present. "
            "This could stem from a high ISO or low-light capture."
        )
        suggestion = "Apply bilateral filter or fastNlMeansDenoising."
        score = 100 - (sigma - cfg.NOISE_LOW) / (cfg.NOISE_HIGH - cfg.NOISE_LOW) * 40
    else:
        label = "High noise"
        explanation = (
            f"Estimated noise σ ≈ {sigma:.2f} — significant noise detected. "
            "Denoising is strongly recommended."
        )
        suggestion = "Use fastNlMeansDenoising with a moderate filter strength."
        score = max(0, 60 - (sigma - cfg.NOISE_HIGH) * 3)

    score = float(np.clip(score, 0, 100))

    return MetricResult(
        name="Noise Level",
        value=round(sigma, 3),
        label=label,
        score=round(score, 1),
        explanation=explanation,
        suggestion=suggestion,
    )


# ---------------------------------------------------------------------------
# 6. White Balance / Colour Cast
# ---------------------------------------------------------------------------

def analyse_white_balance(bgr: BGRImage) -> MetricResult:
    """
    Detect colour cast using the grey-world assumption.

    The grey-world assumption states that for a 'neutral' image the mean of
    each RGB channel should be equal.  A significant deviation of one channel
    from the global mean indicates a colour cast.

    Limitations
    -----------
    The grey-world assumption fails for images with a dominant single colour
    (e.g. a green forest photo).  The result should be treated as an
    indicator, not a guarantee.
    """
    # Work in RGB for intuitive channel naming
    b, g, r = cv2.split(bgr.astype(np.float32))
    mean_b, mean_g, mean_r = float(b.mean()), float(g.mean()), float(r.mean())
    overall_mean = (mean_r + mean_g + mean_b) / 3.0

    dev_r = mean_r - overall_mean
    dev_g = mean_g - overall_mean
    dev_b = mean_b - overall_mean
    max_dev = max(abs(dev_r), abs(dev_g), abs(dev_b))

    # Classify cast direction
    cast_parts = []
    if dev_r > cfg.WB_DEVIATION_THRESHOLD:
        cast_parts.append("warm (red/orange)")
    if dev_b > cfg.WB_DEVIATION_THRESHOLD:
        cast_parts.append("cool (blue)")
    if dev_g > cfg.WB_DEVIATION_THRESHOLD:
        cast_parts.append("green")
    if dev_r < -cfg.WB_DEVIATION_THRESHOLD:
        cast_parts.append("cyan")
    if dev_b < -cfg.WB_DEVIATION_THRESHOLD:
        cast_parts.append("yellow/warm")
    if dev_g < -cfg.WB_DEVIATION_THRESHOLD:
        cast_parts.append("magenta")

    if cast_parts:
        label = f"Cast: {', '.join(cast_parts)}"
        explanation = (
            f"Grey-world analysis: R={mean_r:.1f}, G={mean_g:.1f}, B={mean_b:.1f} "
            f"(overall mean={overall_mean:.1f}). "
            f"Maximum channel deviation: {max_dev:.1f} — "
            f"indicates a {', '.join(cast_parts)} cast."
        )
        suggestion = "Apply grey-world white balance correction to equalise channel means."
        score = max(0, 100 - (max_dev / cfg.WB_DEVIATION_THRESHOLD) * 25)
    else:
        label = "Neutral"
        explanation = (
            f"Grey-world analysis: R={mean_r:.1f}, G={mean_g:.1f}, B={mean_b:.1f} "
            f"(overall mean={overall_mean:.1f}). "
            "Channels are balanced — no strong cast detected."
        )
        suggestion = "No white balance correction needed."
        score = 100.0

    score = float(np.clip(score, 0, 100))

    return MetricResult(
        name="White Balance",
        value=round(max_dev, 2),
        label=label,
        score=round(score, 1),
        explanation=explanation,
        suggestion=suggestion,
        extra={
            "mean_r": round(mean_r, 2),
            "mean_g": round(mean_g, 2),
            "mean_b": round(mean_b, 2),
        },
    )


# ---------------------------------------------------------------------------
# 7. Saturation
# ---------------------------------------------------------------------------

def analyse_saturation(bgr: BGRImage) -> MetricResult:
    """
    Measure colour saturation via the S channel of HSV.

    HSV saturation (0–255) indicates the vividness of hues.  Low saturation
    makes images look washed-out or grey; high saturation makes them look
    garish.
    """
    hsv = bgr_to_hsv(bgr)
    s_channel = hsv[:, :, 1].astype(np.float32)
    mean_sat = float(s_channel.mean())

    if mean_sat < cfg.SATURATION_LOW:
        label = "Undersaturated"
        explanation = (
            f"Mean HSV saturation is {mean_sat:.1f}/255 — below {cfg.SATURATION_LOW}. "
            "Colours appear washed-out or grey."
        )
        suggestion = "Increase saturation in HSV or use a vibrance boost."
        score = (mean_sat / cfg.SATURATION_LOW) * 70
    elif mean_sat > cfg.SATURATION_HIGH:
        label = "Oversaturated"
        explanation = (
            f"Mean HSV saturation is {mean_sat:.1f}/255 — above {cfg.SATURATION_HIGH}. "
            "Colours may look unnatural or garish."
        )
        suggestion = "Reduce saturation slightly for a more natural look."
        score = 75.0
    else:
        label = "Balanced"
        explanation = (
            f"Mean HSV saturation is {mean_sat:.1f}/255 — within the ideal "
            f"range [{cfg.SATURATION_LOW}, {cfg.SATURATION_HIGH}]."
        )
        suggestion = "No saturation change needed."
        score = 100.0

    score = float(np.clip(score, 0, 100))

    return MetricResult(
        name="Saturation",
        value=round(mean_sat, 2),
        label=label,
        score=round(score, 1),
        explanation=explanation,
        suggestion=suggestion,
    )


# ---------------------------------------------------------------------------
# 8. Dynamic Range
# ---------------------------------------------------------------------------

def analyse_dynamic_range(bgr: BGRImage) -> MetricResult:
    """
    Estimate the effective dynamic range of the image.

    Method
    ------
    * Build the grayscale histogram.
    * Count the fraction of non-zero bins (bins with ≥ 1 pixel).
    * A higher fraction indicates a wider tonal spread — better dynamic range.

    Additionally, compute the 1st–99th percentile luminance spread as an
    alternative / complementary measure.
    """
    gray = bgr_to_gray(bgr)
    hist = cv2.calcHist([gray], [0], None, [256], [0, 256]).flatten()
    non_zero_ratio = float(np.count_nonzero(hist) / 256)
    p1  = float(np.percentile(gray, 1))
    p99 = float(np.percentile(gray, 99))
    percentile_spread = p99 - p1

    if non_zero_ratio < cfg.DYNAMIC_RANGE_LOW:
        label = "Narrow dynamic range"
        explanation = (
            f"Only {non_zero_ratio*100:.1f}% of histogram bins are occupied "
            f"(threshold: {cfg.DYNAMIC_RANGE_LOW*100:.0f}%). "
            "The tonal range is compressed — the image may look flat or banded."
        )
        suggestion = "Histogram stretching or CLAHE can expand tonal range."
        score = (non_zero_ratio / cfg.DYNAMIC_RANGE_LOW) * 70
    else:
        label = "Wide dynamic range"
        explanation = (
            f"{non_zero_ratio*100:.1f}% of histogram bins are occupied "
            f"and the 1st–99th percentile luminance spread is {percentile_spread:.1f}. "
            "The image captures a good range of tones."
        )
        suggestion = "No dynamic range intervention required."
        score = min(100.0, 80 + non_zero_ratio * 20)

    score = float(np.clip(score, 0, 100))

    return MetricResult(
        name="Dynamic Range",
        value=round(non_zero_ratio * 100, 1),
        label=label,
        score=round(score, 1),
        explanation=explanation,
        suggestion=suggestion,
        extra={"percentile_spread": round(percentile_spread, 1), "p1": p1, "p99": p99},
    )


# ---------------------------------------------------------------------------
# Top-level entry point
# ---------------------------------------------------------------------------

def analyse_image(bgr: BGRImage) -> FullAnalysis:
    """
    Run all analysis metrics on a BGR image.

    Returns a :class:\`FullAnalysis\` containing one :class:\`MetricResult\`
    per metric.  Composition analysis is *not* run here — it lives in
    \`\`composition.py\`\` and is attached separately.
    """
    return FullAnalysis(
        brightness=analyse_brightness(bgr),
        contrast=analyse_contrast(bgr),
        histogram=analyse_histogram(bgr),
        sharpness=analyse_sharpness(bgr),
        noise=analyse_noise(bgr),
        white_balance=analyse_white_balance(bgr),
        saturation=analyse_saturation(bgr),

composition.py — Heuristic-based composition analysis and crop suggestion.

Implemented checks
------------------
1. Rule-of-thirds grid scoring (saliency alignment to power-point intersections).
2. Saliency-weighted centre of visual mass.
3. Horizontal horizon detection (Hough lines).
4. Suggested crop rectangle based on saliency map and rule-of-thirds.

All methods are explicitly heuristic — that is clearly documented so users
understand the limitations.
"""

from __future__ import annotations

from dataclasses import dataclass
from typing import Optional

import cv2
import numpy as np

from src.utils import bgr_to_gray, BGRImage
from src.analysis import MetricResult
from src import config as cfg


# ---------------------------------------------------------------------------
# Data containers
# ---------------------------------------------------------------------------

@dataclass
class CompositionResult:
    """Output of the composition analyser."""
    metric:          MetricResult
    saliency_map:    np.ndarray       # Normalised float32 [0,1] saliency
    thirds_overlay:  np.ndarray       # BGR image with thirds grid drawn
    crop_rect:       tuple[int,int,int,int] | None  # (x1,y1,x2,y2) or None
    horizon_angle:   float | None     # degrees from horizontal, or None
    visual_center:   tuple[float,float]              # (cx_frac, cy_frac)


# ---------------------------------------------------------------------------
# Saliency approximation
# ---------------------------------------------------------------------------

def _compute_saliency(bgr: BGRImage) -> np.ndarray:
    """
    Approximate a saliency map using edge energy.

    Method
    ------
    1. Convert to grayscale.
    2. Apply Canny edge detection.
    3. Dilate to get 'edge regions'.
    4. Gaussian blur to get a smooth saliency proxy.

    This is a simple spectral-inspired heuristic, not a deep saliency model.
    The result is a float32 array normalised to [0, 1].
    """
    gray = bgr_to_gray(bgr)
    # Edge detection
    edges = cv2.Canny(gray, 50, 150)
    # Dilate to capture nearby pixels
    kernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (11, 11))
    dilated = cv2.dilate(edges, kernel)
    # Smooth
    sal = cv2.GaussianBlur(dilated.astype(np.float32), (51, 51), 0)
    # Also include a local-contrast component
    local_std = cv2.GaussianBlur(
        (gray.astype(np.float32) - cv2.GaussianBlur(gray.astype(np.float32), (15, 15), 0)) ** 2,
        (51, 51),
        0,
    )
    sal = sal + local_std
    # Normalise
    sal_min, sal_max = sal.min(), sal.max()
    if sal_max > sal_min:
        sal = (sal - sal_min) / (sal_max - sal_min)
    else:
        sal = np.zeros_like(sal)
    return sal.astype(np.float32)


# ---------------------------------------------------------------------------
# Rule of thirds
# ---------------------------------------------------------------------------

def _thirds_score(saliency: np.ndarray) -> float:
    """
    Score how well the saliency aligns with rule-of-thirds power points.

    The four power points are at (1/3, 1/3), (1/3, 2/3), (2/3, 1/3), (2/3, 2/3)
    as fractions of image dimensions.  For each power point, we sample the
    saliency in a small neighbourhood.  The maximum over all four points is
    returned, scaled to [0, 100].
    """
    h, w = saliency.shape
    thirds_fracs = [(1/3, 1/3), (1/3, 2/3), (2/3, 1/3), (2/3, 2/3)]
    tol = cfg.THIRDS_TOLERANCE   # neighbourhood radius as fraction
    tol_h = int(tol * h)
    tol_w = int(tol * w)

    max_sal = 0.0
    for fy, fx in thirds_fracs:
        cy, cx = int(fy * h), int(fx * w)
        patch = saliency[
            max(0, cy - tol_h): min(h, cy + tol_h),
            max(0, cx - tol_w): min(w, cx + tol_w),
        ]
        if patch.size > 0:
            max_sal = max(max_sal, float(patch.mean()))

    return float(np.clip(max_sal * 100, 0, 100))


def _draw_thirds_grid(bgr: BGRImage) -> np.ndarray:
    """Draw a rule-of-thirds overlay on a copy of *bgr*."""
    h, w = bgr.shape[:2]
    overlay = bgr.copy()
    color = (0, 200, 255)   # Yellow-orange
    thickness = 1

    # Vertical lines
    for fx in [1/3, 2/3]:
        x = int(fx * w)
        cv2.line(overlay, (x, 0), (x, h), color, thickness)
    # Horizontal lines
    for fy in [1/3, 2/3]:
        y = int(fy * h)
        cv2.line(overlay, (0, y), (w, y), color, thickness)
    # Power-point circles
    for fy, fx in [(1/3, 1/3), (1/3, 2/3), (2/3, 1/3), (2/3, 2/3)]:
        cx, cy = int(fx * w), int(fy * h)
        cv2.circle(overlay, (cx, cy), max(6, w // 60), (0, 255, 255), 2)

    return overlay


# ---------------------------------------------------------------------------
# Visual centre of mass
# ---------------------------------------------------------------------------

def _visual_center(saliency: np.ndarray) -> tuple[float, float]:
    """
    Return the saliency-weighted centre of mass as (cx_frac, cy_frac).

    Both fractions are in [0, 1] relative to image width and height.
    """
    h, w = saliency.shape
    total = saliency.sum()
    if total < 1e-9:
        return 0.5, 0.5
    ys, xs = np.mgrid[0:h, 0:w]
    cx = float((xs * saliency).sum() / total) / w
    cy = float((ys * saliency).sum() / total) / h
    return cx, cy


# ---------------------------------------------------------------------------
# Horizon detection
# ---------------------------------------------------------------------------

def _estimate_horizon_angle(bgr: BGRImage) -> float | None:
    """
    Detect dominant horizontal lines via Hough transforms.

    Returns the angle (in degrees from horizontal) of the dominant nearly-
    horizontal line, or None if detection fails.

    Limitation: works best on landscape photos with clear sky/land boundaries.
    """
    gray = bgr_to_gray(bgr)
    edges = cv2.Canny(gray, 50, 150)
    lines = cv2.HoughLinesP(
        edges,
        rho=1,
        theta=np.pi / 180,
        threshold=80,
        minLineLength=gray.shape[1] // 4,
        maxLineGap=20,
    )
    if lines is None:
        return None

    angles = []
    for line in lines:
        x1, y1, x2, y2 = line[0]
        angle = float(np.degrees(np.arctan2(y2 - y1, x2 - x1)))
        if abs(angle) < 15:  # near-horizontal only
            angles.append(angle)

    if not angles:
        return None
    return float(np.median(angles))


# ---------------------------------------------------------------------------
# Crop suggestion
# ---------------------------------------------------------------------------

def _suggest_crop(saliency: np.ndarray, frac: float = 0.80) -> tuple[int,int,int,int]:
    """
    Suggest a crop window that covers *frac* of saliency mass and is aligned
    to the rule-of-thirds grid.

    Returns (x1, y1, x2, y2) in pixel coordinates.
    """
    h, w = saliency.shape
    threshold = float(np.percentile(saliency, 60))
    mask = (saliency >= threshold).astype(np.uint8)
    ys, xs = np.where(mask > 0)

    if len(xs) == 0:
        return (0, 0, w, h)

    x1 = int(xs.min())
    y1 = int(ys.min())
    x2 = int(xs.max())
    y2 = int(ys.max())

    # Add 10 % padding
    pad_x = int((x2 - x1) * 0.10)
    pad_y = int((y2 - y1) * 0.10)
    x1 = max(0, x1 - pad_x)
    y1 = max(0, y1 - pad_y)
    x2 = min(w, x2 + pad_x)
    y2 = min(h, y2 + pad_y)

    return (x1, y1, x2, y2)


# ---------------------------------------------------------------------------
# Top-level entry point
# ---------------------------------------------------------------------------

def analyse_composition(bgr: BGRImage) -> CompositionResult:
    """
    Run all composition checks and return a :class:\`CompositionResult\`.
    """
    saliency = _compute_saliency(bgr)
    thirds_score_val = _thirds_score(saliency)
    vis_cx, vis_cy = _visual_center(saliency)
    horizon_angle = _estimate_horizon_angle(bgr)
    thirds_overlay = _draw_thirds_grid(bgr)
    crop_rect = _suggest_crop(saliency)

    # --- Scoring ---
    score = thirds_score_val  # main driver

    # Penalise if visual centre is far from a thirds line
    cx_deviation = min(abs(vis_cx - 1/3), abs(vis_cx - 2/3), abs(vis_cx - 0.5))
    cy_deviation = min(abs(vis_cy - 1/3), abs(vis_cy - 2/3), abs(vis_cy - 0.5))
    centre_penalty = (cx_deviation + cy_deviation) * 30
    score = float(np.clip(score - centre_penalty, 0, 100))

    # Penalise tilted horizon
    if horizon_angle is not None and abs(horizon_angle) > 2.0:
        score = float(np.clip(score - abs(horizon_angle) * 2, 0, 100))

    # Build label
    if score >= 70:
        label = "Well composed"
    elif score >= 45:
        label = "Acceptable composition"
    else:
        label = "Composition could be improved"

    horizon_str = (
        f"{horizon_angle:.1f}° tilt detected." if horizon_angle is not None else
        "Horizon angle not detectable."
    )

    explanation = (
        f"Rule-of-thirds saliency alignment score: {thirds_score_val:.1f}/100. "
        f"Visual centre of mass: ({vis_cx:.2f}, {vis_cy:.2f}) (fraction of W, H). "
        f"{horizon_str} "
        "Note: composition analysis is heuristic-based and should be used as a guide."
    )

    suggestion = (
        "No change needed." if score >= 70 else
        "Consider cropping to the suggested rectangle or repositioning the main subject "
        "closer to a rule-of-thirds intersection."
    )

    metric = MetricResult(
        name="Composition",
        value=round(score, 1),
        label=label,
        score=round(score, 1),
        explanation=explanation,
        suggestion=suggestion,
        extra={
            "thirds_score": round(thirds_score_val, 1),
            "visual_center_x": round(vis_cx, 3),
            "visual_center_y": round(vis_cy, 3),
            "horizon_angle": round(horizon_angle, 2) if horizon_angle is not None else None,
        },
    )

    return CompositionResult(
        metric=metric,
        saliency_map=saliency,
        thirds_overlay=thirds_overlay,
        crop_rect=crop_rect,
        horizon_angle=horizon_angle,
        visual_center=(vis_cx, vis_cy),
    )

enhancement.py — Image enhancement pipeline.

Each function accepts a BGR NumPy array, applies one correction method,
and returns the enhanced BGR array together with a human-readable log entry
describing what was done and why.
"""

from __future__ import annotations

from dataclasses import dataclass

import cv2
import numpy as np
from PIL import Image, ImageEnhance

from src import config as cfg
from src.utils import bgr_to_gray, bgr_to_hsv, BGRImage


# ---------------------------------------------------------------------------
# Data container
# ---------------------------------------------------------------------------

@dataclass
class EnhancementStep:
    """Records one applied enhancement."""
    name:        str
    applied:     bool
    reason:      str
    before_stat: float | None = None
    after_stat:  float | None = None
    unit:        str = ""


@dataclass
class EnhancementResult:
    """Container returned by the enhancement pipeline."""
    enhanced_bgr: BGRImage
    steps:        list[EnhancementStep]


# ---------------------------------------------------------------------------
# 1. Exposure/Gamma correction
# ---------------------------------------------------------------------------

def apply_gamma_correction(bgr: BGRImage, gamma: float) -> BGRImage:
    """
    Apply gamma correction using a lookup table (LUT) for efficiency.

    A gamma < 1.0 brightens; gamma > 1.0 darkens.
    The output pixel value is: out = (in / 255)^(1/gamma) * 255 .

    Parameters
    ----------
    bgr   : Input BGR image.
    gamma : Desired gamma value (positive float, not zero).
    """
    if gamma <= 0:
        raise ValueError("gamma must be a positive number.")
    inv_gamma = 1.0 / gamma
    table = np.array(
        [((i / 255.0) ** inv_gamma) * 255 for i in range(256)],
        dtype=np.uint8,
    )
    return cv2.LUT(bgr, table)


def correct_exposure(
    bgr: BGRImage,
    target_mean: float = 128.0,
    gamma_override: float | None = None,
) -> tuple[BGRImage, EnhancementStep]:
    """
    Adaptively correct exposure via gamma.

    If *gamma_override* is given it is used directly; otherwise gamma is
    estimated so that the current grayscale mean maps to *target_mean*
    using the relationship:  target = mean^(1/gamma)  →  gamma = log(mean)/log(target).
    """
    gray = bgr_to_gray(bgr)
    before_mean = float(np.mean(gray))

    if gamma_override is not None:
        gamma = gamma_override
    else:
        # Avoid log(0) — clamp mean to [1, 254]
        clamped_mean = float(np.clip(before_mean, 1, 254))
        clamped_target = float(np.clip(target_mean, 1, 254))
        try:
            gamma = np.log(clamped_mean / 255.0) / np.log(clamped_target / 255.0)
            gamma = float(np.clip(gamma, 0.2, 5.0))
        except (ValueError, ZeroDivisionError):
            gamma = 1.0

    out = apply_gamma_correction(bgr, gamma)
    after_mean = float(np.mean(bgr_to_gray(out)))

    applied = abs(gamma - 1.0) > 0.05
    return out, EnhancementStep(
        name="Exposure / Gamma Correction",
        applied=applied,
        reason=f"Gamma={gamma:.3f} applied to shift mean brightness from "
               f"{before_mean:.1f} → {after_mean:.1f}.",
        before_stat=round(before_mean, 1),
        after_stat=round(after_mean, 1),
        unit="mean brightness (0–255)",
    )


# ---------------------------------------------------------------------------
# 2. Contrast — CLAHE
# ---------------------------------------------------------------------------

def apply_clahe(
    bgr: BGRImage,
    clip_limit: float = cfg.DEFAULT_CLAHE_CLIP,
    tile_size: int = cfg.DEFAULT_CLAHE_TILE,
) -> tuple[BGRImage, EnhancementStep]:
    """
    Apply Contrast Limited Adaptive Histogram Equalisation (CLAHE) to the
    L channel of the LAB colour space, then convert back.

    CLAHE operates per-tile and clips the histogram to prevent noise
    amplification — an improvement over plain global HE.
    """
    gray = bgr_to_gray(bgr)
    before_std = float(np.std(gray.astype(np.float32)))

    lab = cv2.cvtColor(bgr, cv2.COLOR_BGR2LAB)
    l_ch, a_ch, b_ch = cv2.split(lab)
    clahe = cv2.createCLAHE(
        clipLimit=clip_limit,
        tileGridSize=(tile_size, tile_size),
    )
    l_eq = clahe.apply(l_ch)
    lab_eq = cv2.merge([l_eq, a_ch, b_ch])
    out = cv2.cvtColor(lab_eq, cv2.COLOR_LAB2BGR)

    after_std = float(np.std(bgr_to_gray(out).astype(np.float32)))

    return out, EnhancementStep(
        name="CLAHE Contrast Enhancement",
        applied=True,
        reason=(
            f"CLAHE (clip={clip_limit}, tile={tile_size}×{tile_size}) applied "
            "to L-channel of LAB image."
        ),
        before_stat=round(before_std, 2),
        after_stat=round(after_std, 2),
        unit="grayscale std-dev",
    )


# ---------------------------------------------------------------------------
# 3. Histogram stretching (global)
# ---------------------------------------------------------------------------

def apply_histogram_stretching(bgr: BGRImage) -> tuple[BGRImage, EnhancementStep]:
    """
    Linear contrast stretching using the 1st and 99th percentile values.

    Clips 1 % of the darkest and 1 % of the brightest pixels to avoid
    outlier influence.
    """
    gray = bgr_to_gray(bgr)
    p1  = int(np.percentile(gray, 1))
    p99 = int(np.percentile(gray, 99))

    channels = cv2.split(bgr)
    stretched = []
    for ch in channels:
        stretched.append(np.clip(
            (ch.astype(np.float32) - p1) / max(p99 - p1, 1) * 255,
            0, 255,
        ).astype(np.uint8))
    out = cv2.merge(stretched)

    return out, EnhancementStep(
        name="Histogram Stretching",
        applied=True,
        reason=(
            f"Linear stretch from [{p1}, {p99}] to [0, 255] on each channel."
        ),
        before_stat=float(p1),
        after_stat=float(p99),
        unit="1st–99th percentile range",
    )


# ---------------------------------------------------------------------------
# 4. White balance — grey-world correction
# ---------------------------------------------------------------------------

def apply_white_balance(bgr: BGRImage) -> tuple[BGRImage, EnhancementStep]:
    """
    Grey-world white balance correction.

    Scale each BGR channel so that its mean equals the overall pixel mean.
    This is a simple but effective first-order colour cast removal technique.

    Limitation: fails on images with a dominant single hue.
    """
    b, g, r = cv2.split(bgr.astype(np.float32))
    overall_mean = (b.mean() + g.mean() + r.mean()) / 3.0
    b_scale = overall_mean / max(b.mean(), 1e-6)
    g_scale = overall_mean / max(g.mean(), 1e-6)
    r_scale = overall_mean / max(r.mean(), 1e-6)

    b_c = np.clip(b * b_scale, 0, 255).astype(np.uint8)
    g_c = np.clip(g * g_scale, 0, 255).astype(np.uint8)
    r_c = np.clip(r * r_scale, 0, 255).astype(np.uint8)
    out = cv2.merge([b_c, g_c, r_c])

    return out, EnhancementStep(
        name="Grey-World White Balance",
        applied=True,
        reason=(
            f"Channel scales: R×{r_scale:.3f}, G×{g_scale:.3f}, B×{b_scale:.3f}. "
            "Each channel mean equalised to the overall mean."
        ),
        before_stat=round(overall_mean, 1),
        after_stat=None,
        unit="mean brightness (0–255)",
    )


# ---------------------------------------------------------------------------
# 5. Denoising
# ---------------------------------------------------------------------------

def apply_denoising(
    bgr: BGRImage,
    method: str = "bilateral",
    h: int = cfg.DEFAULT_DENOISE_H,
) -> tuple[BGRImage, EnhancementStep]:
    """
    Reduce noise using either bilateral filtering or Non-Local Means.

    Parameters
    ----------
    method : "bilateral" (faster, preserves edges) or "nlmeans" (stronger).
    h      : Filter strength for both methods.
    """
    if method == "nlmeans":
        out = cv2.fastNlMeansDenoisingColored(bgr, None, h, h, 7, 21)
        method_desc = f"Non-Local Means (h={h})"
    else:  # bilateral
        out = cv2.bilateralFilter(bgr, d=9, sigmaColor=h * 7, sigmaSpace=h * 7)
        method_desc = f"Bilateral filter (d=9, sigma={h*7})"

    return out, EnhancementStep(
        name="Denoising",
        applied=True,
        reason=f"{method_desc} applied to suppress high-frequency noise.",
        before_stat=None,
        after_stat=None,
        unit="",
    )


# ---------------------------------------------------------------------------
# 6. Sharpening — Unsharp Masking
# ---------------------------------------------------------------------------

def apply_sharpening(
    bgr: BGRImage,
    amount: float = cfg.DEFAULT_SHARPEN_AMOUNT,
    radius: int = 1,
    threshold: int = 3,
) -> tuple[BGRImage, EnhancementStep]:
    """
    Unsharp Masking (USM) sharpening.

    Method
    ------
    1. Blur the image with a Gaussian kernel (radius).
    2. Compute the residual: residual = original − blurred.
    3. Add a scaled residual back: sharp = original + amount × residual.
    4. Only add residual where |residual| > threshold (avoids noise amplification).

    Parameters
    ----------
    amount    : Sharpening strength multiplier (typically 1.0–2.5).
    radius    : Gaussian blur kernel radius (pixels).
    threshold : Minimum change to apply sharpening (avoids noise on flat regions).
    """
    kernel_size = 2 * radius + 1
    blurred = cv2.GaussianBlur(bgr.astype(np.float32), (kernel_size, kernel_size), 0)
    residual = bgr.astype(np.float32) - blurred
    residual[np.abs(residual) < threshold] = 0
    out = np.clip(bgr.astype(np.float32) + amount * residual, 0, 255).astype(np.uint8)

    return out, EnhancementStep(
        name="Unsharp Masking Sharpening",
        applied=True,
        reason=(
            f"USM: amount={amount}, radius={radius}px, threshold={threshold}. "
            "Edges enhanced without amplifying flat-area noise."
        ),
        before_stat=None,
        after_stat=None,
        unit="",
    )


# ---------------------------------------------------------------------------
# 7. Saturation adjustment
# ---------------------------------------------------------------------------

def apply_saturation(
    bgr: BGRImage,
    scale: float = 1.3,
) -> tuple[BGRImage, EnhancementStep]:
    """
    Scale the S channel in HSV to adjust colour saturation.

    A scale > 1 increases saturation; scale < 1 desaturates.
    Values are clipped to [0, 255] to prevent overflow.
    """
    hsv = bgr_to_hsv(bgr).astype(np.float32)
    h_ch, s_ch, v_ch = cv2.split(hsv)
    before_mean = float(s_ch.mean())
    s_ch = np.clip(s_ch * scale, 0, 255)
    out_hsv = cv2.merge([h_ch, s_ch, v_ch]).astype(np.uint8)
    out = cv2.cvtColor(out_hsv, cv2.COLOR_HSV2BGR)
    after_mean = float(cv2.split(bgr_to_hsv(out).astype(np.float32))[1].mean())

    return out, EnhancementStep(
        name="Saturation Adjustment",
        applied=True,
        reason=f"S-channel scaled by {scale:.2f}: {before_mean:.1f} → {after_mean:.1f}.",
        before_stat=round(before_mean, 1),
        after_stat=round(after_mean, 1),
        unit="mean HSV saturation (0–255)",
    )


# ---------------------------------------------------------------------------
# 8. Highlight / Shadow recovery (simple tone-mapping approach)
# ---------------------------------------------------------------------------

def apply_shadow_highlight_recovery(
    bgr: BGRImage,
    shadow_lift: float = 0.15,
    highlight_compress: float = 0.85,
) -> tuple[BGRImage, EnhancementStep]:
    """
    Perform simple shadow lift and highlight compression using a tone curve.

    The idea is to remap the [0, 255] range with a sigmoid-like or piecewise
    linear tone curve that lifts very dark tones (aids shadow detail) and
    compresses very bright tones (preserves highlight detail).

    Parameters
    ----------
    shadow_lift          : Fractional lift for the 0 value (0 = no lift).
    highlight_compress   : Fractional cap for the 255 value (1 = no compression).
    """
    # Build a small LUT
    table = np.arange(256, dtype=np.float32) / 255.0
    # Linear remap: [0,1] → [shadow_lift, highlight_compress]
    table = table * (highlight_compress - shadow_lift) + shadow_lift
    table = np.clip(table * 255, 0, 255).astype(np.uint8)
    out = cv2.LUT(bgr, table)

    return out, EnhancementStep(
        name="Shadow/Highlight Recovery",
        applied=True,
        reason=(
            f"Tone curve: shadows lifted to {shadow_lift*255:.0f}, "
            f"highlights compressed to {highlight_compress*255:.0f}."
        ),
        before_stat=None,
        after_stat=None,
        unit="",
    )


# ---------------------------------------------------------------------------
# Full pipeline
# ---------------------------------------------------------------------------

def run_enhancement_pipeline(
    bgr: BGRImage,
    *,
    fix_exposure:         bool = True,
    fix_contrast:         bool = True,
    fix_white_balance:    bool = True,
    fix_denoise:          bool = False,
    fix_sharpen:          bool = True,
    fix_saturation:       bool = False,
    fix_shadow_highlight: bool = False,
    # Manual overrides
    gamma_override:       float | None = None,
    denoise_method:       str = "bilateral",
    denoise_strength:     int = cfg.DEFAULT_DENOISE_H,
    clahe_clip:           float = cfg.DEFAULT_CLAHE_CLIP,
    clahe_tile:           int = cfg.DEFAULT_CLAHE_TILE,
    sharpen_amount:       float = cfg.DEFAULT_SHARPEN_AMOUNT,
    saturation_scale:     float = 1.3,
    shadow_lift:          float = 0.15,
    highlight_compress:   float = 0.85,
) -> EnhancementResult:
    """
    Run selected enhancements sequentially and return the result.

    The pipeline order matters:
    1. Exposure (gamma) first — correct overall brightness.
    2. White balance — remove colour cast on corrected brightness.
    3. Contrast (CLAHE) — expand tonal range after WB.
    4. Denoising — remove noise before sharpening.
    5. Sharpening — enhance detail after denoising.
    6. Saturation — colour vibrancy last.
    7. Shadow/Highlight — optional final tone adjustment.
    """
    current = bgr.copy()
    steps: list[EnhancementStep] = []

    if fix_exposure:
        current, step = correct_exposure(current, gamma_override=gamma_override)
        steps.append(step)

    if fix_white_balance:
        current, step = apply_white_balance(current)
        steps.append(step)

    if fix_contrast:
        current, step = apply_clahe(current, clip_limit=clahe_clip, tile_size=clahe_tile)
        steps.append(step)

    if fix_denoise:
        current, step = apply_denoising(current, method=denoise_method, h=denoise_strength)
        steps.append(step)

    if fix_sharpen:
        current, step = apply_sharpening(current, amount=sharpen_amount)
        steps.append(step)

    if fix_saturation:
        current, step = apply_saturation(current, scale=saturation_scale)
        steps.append(step)

    if fix_shadow_highlight:
        current, step = apply_shadow_highlight_recovery(
            current, shadow_lift=shadow_lift, highlight_compress=highlight_compress
        )
        steps.append(step)

    return EnhancementResult(enhanced_bgr=current, steps=steps)

image_io.py — Image upload, validation, metadata extraction, and safe resizing.

Responsibilities
----------------
* Accept an uploaded file object (from Streamlit or a file path).
* Validate format (whitelist) and integrity (can it be decoded?).
* Extract EXIF / basic image metadata if available.
* Return a consistently-typed BGR NumPy array alongside the original PIL image.
"""

from __future__ import annotations

import io
import os
from dataclasses import dataclass, field
from pathlib import Path
from typing import Optional

import cv2
import numpy as np
from PIL import Image, ExifTags, UnidentifiedImageError

from src.config import ALLOWED_EXTENSIONS, MAX_FILE_SIZE_MB, MAX_IMAGE_DIMENSION
from src.utils import pil_to_bgr, safe_resize, BGRImage


# ---------------------------------------------------------------------------
# Data container
# ---------------------------------------------------------------------------

@dataclass
class ImageBundle:
    """
    Holds every representation of an image that the application needs.

    Attributes
    ----------
    original_pil   : The untouched PIL Image (RGB, may be large).
    original_bgr   : The (possibly resized) BGR NumPy array for CV processing.
    display_pil    : Same as original_bgr but back as PIL for display.
    filename       : Original filename or "unknown".
    metadata       : Dictionary of extracted metadata fields.
    was_resized    : True if the image was downscaled to fit MAX_IMAGE_DIMENSION.
    original_size  : (width, height) before any resizing.
    processing_size: (width, height) after resizing.
    """
    original_pil:    Image.Image
    original_bgr:    BGRImage
    display_pil:     Image.Image
    filename:        str = "unknown"
    metadata:        dict = field(default_factory=dict)
    was_resized:     bool = False
    original_size:   tuple[int, int] = (0, 0)
    processing_size: tuple[int, int] = (0, 0)


# ---------------------------------------------------------------------------
# Validation helpers
# ---------------------------------------------------------------------------

class ImageValidationError(ValueError):
    """Raised when uploaded image fails validation."""


def _check_extension(filename: str) -> None:
    """Raise ImageValidationError if the file extension is not whitelisted."""
    ext = Path(filename).suffix.lower()
    if ext not in ALLOWED_EXTENSIONS:
        raise ImageValidationError(
            f"Unsupported file type '{ext}'. Allowed: {', '.join(ALLOWED_EXTENSIONS)}"
        )


def _check_file_size(data: bytes, filename: str) -> None:
    """Raise ImageValidationError if the byte payload exceeds the size limit."""
    size_mb = len(data) / (1024 ** 2)
    if size_mb > MAX_FILE_SIZE_MB:
        raise ImageValidationError(
            f"File '{filename}' is {size_mb:.1f} MB, which exceeds the "
            f"{MAX_FILE_SIZE_MB} MB limit."
        )


def _decode_pil(data: bytes, filename: str) -> Image.Image:
    """
    Attempt to open image bytes with Pillow.

    Raises ImageValidationError if the bytes do not represent a valid image.
    """
    try:
        pil_img = Image.open(io.BytesIO(data))
        pil_img.verify()          # raises on corruption
        # Re-open after verify() (verify() closes the internal file pointer)
        pil_img = Image.open(io.BytesIO(data))
        pil_img = pil_img.convert("RGB")  # normalise to RGB; drops palette etc.
        return pil_img
    except UnidentifiedImageError:
        raise ImageValidationError(
            f"'{filename}' could not be decoded. The file appears to be corrupt "
            "or is not a valid image."
        )
    except Exception as exc:
        raise ImageValidationError(
            f"Failed to open '{filename}': {exc}"
        ) from exc


# ---------------------------------------------------------------------------
# Metadata extraction
# ---------------------------------------------------------------------------

def _extract_metadata(pil_img: Image.Image) -> dict:
    """
    Extract basic metadata from a PIL image.

    Falls back gracefully if EXIF is unavailable.
    """
    meta: dict = {
        "Format":       pil_img.format or "Unknown",
        "Mode":         pil_img.mode,
        "Width (px)":   pil_img.width,
        "Height (px)":  pil_img.height,
        "Megapixels":   f"{(pil_img.width * pil_img.height) / 1_000_000:.2f} MP",
        "Aspect ratio": f"{pil_img.width / max(pil_img.height, 1):.3f}",
    }

    # Try EXIF
    try:
        exif_data = pil_img._getexif()  # type: ignore[attr-defined]
        if exif_data:
            for tag_id, value in exif_data.items():
                tag_name = ExifTags.TAGS.get(tag_id, str(tag_id))
                if tag_name in (
                    "Make", "Model", "Software",
                    "DateTime", "ExposureTime", "FNumber",
                    "ISOSpeedRatings", "FocalLength",
                    "Flash", "WhiteBalance",
                ):
                    meta[tag_name] = str(value)
    except (AttributeError, Exception):
        pass  # No EXIF or unreadable — silently continue

    return meta


# ---------------------------------------------------------------------------
# Public API
# ---------------------------------------------------------------------------

def load_image_from_bytes(data: bytes, filename: str = "upload.jpg") -> ImageBundle:
    """
    Validate and load image bytes into an :class:\`ImageBundle\`.

    Parameters
    ----------
    data     : Raw bytes from file upload or disk read.
    filename : Original filename (used for extension check and display).

    Returns
    -------
    ImageBundle with all representations populated.

    Raises
    ------
    ImageValidationError on any validation failure.
    """
    _check_extension(filename)
    _check_file_size(data, filename)
    pil_img = _decode_pil(data, filename)

    metadata = _extract_metadata(pil_img)
    original_size = (pil_img.width, pil_img.height)

    # Convert to BGR for OpenCV processing
    bgr = pil_to_bgr(pil_img)

    # Resize if necessary (preserves aspect ratio)
    bgr_resized = safe_resize(bgr, MAX_IMAGE_DIMENSION)
    was_resized = bgr_resized.shape[:2] != bgr.shape[:2]
    processing_size = (bgr_resized.shape[1], bgr_resized.shape[0])

    # Build display PIL from (possibly resized) BGR
    from src.utils import bgr_to_pil  # local import to avoid circular dependency
    display_pil = bgr_to_pil(bgr_resized)

    return ImageBundle(
        original_pil=pil_img,
        original_bgr=bgr_resized,
        display_pil=display_pil,
        filename=filename,
        metadata=metadata,
        was_resized=was_resized,
        original_size=original_size,
        processing_size=processing_size,
    )


def load_image_from_path(path: str | Path) -> ImageBundle:
    """
    Convenience wrapper to load an image from a local file path.

    Parameters
    ----------
    path : Absolute or relative path to the image.
    """
    p = Path(path)
    if not p.exists():
        raise ImageValidationError(f"File not found: {path}")
    data = p.read_bytes()
    return load_image_from_bytes(data, filename=p.name)

scoring.py — Weighted quality scoring engine.

Aggregates per-metric sub-scores into a final score out of 100 and
generates human-readable interpretation.
"""

from __future__ import annotations

from dataclasses import dataclass

import numpy as np

from src import config as cfg
from src.analysis import FullAnalysis, MetricResult


# ---------------------------------------------------------------------------
# Data container
# ---------------------------------------------------------------------------

@dataclass
class ScoreReport:
    """Complete scoring output."""
    sub_scores:         dict[str, float]   # metric_key → sub_score (0–100)
    weighted_scores:    dict[str, float]   # metric_key → weighted contribution
    total_score:        float              # 0–100
    band:               str               # e.g. "Good"
    reductions:         list[str]         # Why the score was reduced
    improvements:       list[str]         # What enhancements helped / would help


def _band(score: float) -> str:
    """Return the quality band label for *score*."""
    for threshold, label in cfg.SCORE_BANDS:
        if score >= threshold:
            return label
    return "Poor"


def compute_score(analysis: FullAnalysis) -> ScoreReport:
    """
    Compute a transparent weighted score from a :class:\`FullAnalysis\`.

    The weights are defined in :data:\`src.config.SCORE_WEIGHTS\` and
    sum to 100.  Each metric contributes:

    sub_scores:      dict[str, float] = {}
    weighted_scores: dict[str, float] = {}

            weighted_scores[key] = weight * 0.5

        weighted_scores[key] = round(contribution, 2)

            reductions.append(

                improvements.append(f"• {metric.name}: {metric.suggestion}")

    total = float(np.clip(sum(weighted_scores.values()), 0, 100))

    return ScoreReport(
        sub_scores=sub_scores,
        weighted_scores=weighted_scores,
        total_score=round(total, 1),
        band=_band(total),
        reductions=reductions,
