<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      "width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Intelligent Photo Editing Assistant</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: [
            "opencv-python-headless",
            "numpy",
            "Pillow",
            "matplotlib",
            "scikit-image",
            "pandas",
            "scipy",
            "fpdf2"
          ],
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "app.py",
            },
            "src/analysis.py": { url: "src/analysis.py" },
            "src/composition.py": { url: "src/composition.py" },
            "src/config.py": { url: "src/config.py" },
            "src/enhancement.py": { url: "src/enhancement.py" },
            "src/image_io.py": { url: "src/image_io.py" },
            "src/reporting.py": { url: "src/reporting.py" },
            "src/scoring.py": { url: "src/scoring.py" },
            "src/utils.py": { url: "src/utils.py" },
            "src/visualization.py": { url: "src/visualization.py" },
            "src/__init__.py": { content: "" },
          },
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
